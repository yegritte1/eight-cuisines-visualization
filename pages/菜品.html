<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八大菜系多维数据可视化</title>
    <link href="../libs/fonts/fonts-local.css" rel="stylesheet">
    <style>
        /*
        ========================================
        1. 基础样式
        ========================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: #f5f3ed;
            color: #333;
            height: 100vh; /* 固定视口高度 */
            overflow: hidden; /* 禁止整页滚动 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px; /* 进一步缩小间距 */
        }

        /* 统一背景色变量 */
        :root {
            --bg-color: #f5f3ed;
        }

        /*
        ========================================
        2. 布局设计 - 2行x4列 (去卡片化)
        ========================================
        */
        .container {
            width: 100%;
            max-width: 1500px;
            flex: 1; /* 占据剩余空间 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 防止内部内容撑开高度 */
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px 30px; /* 进一步缩小间距 */
            justify-items: center;
            width: 100%;
        }

        /*
        ========================================
        3. 单个菜品项 (无边框, 无背景)
        ========================================
        */
        .dish-item {
            width: 100%;
            max-width: 280px; /* 进一步缩小宽度 */
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dish-item:hover {
            transform: scale(1.05);
        }

        /*
        ========================================
        4. 核心圆环 (Canvas)
        ========================================
        */
        .ring-container {
            width: 260px; /* 整体缩小，确保屏幕放得下 */
            height: 260px;
            position: relative;
            margin-bottom: 5px;
        }

        .ring-container canvas {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); /* 添加灵动的弹跳过渡 */
        }

        .dish-item:hover .ring-container canvas {
            transform: translate(-50%, -50%) rotate(12deg); /* 首页圆盘小幅旋转 */
        }

        /*
        ========================================
        5. 交互式图片 (普通/爆炸切换)
        ========================================
        */
        .image-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; /* 稍微调大容器 */
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* 让鼠标事件穿透到父容器 */
        }

        .dish-img-normal {
            width: 140px; /* 稍微调大菜品图 */
            height: 140px;
            object-fit: contain;
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: absolute;
            z-index: 2;
        }

        .dish-img-explode {
            width: 165px; /* 稍微调大爆炸图 */
            height: 165px;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            z-index: 3;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
        }

        .dish-item:hover .dish-img-normal {
            opacity: 0;
            transform: scale(0.8);
        }

        .dish-item:hover .dish-img-explode {
            opacity: 1;
            transform: scale(1);
        }

        /*
        ========================================
        6. 文本描述
        ========================================
        */
        .dish-info {
            text-align: center;
            width: 100%;
            padding: 0 10px;
        }

        .dish-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #2c3e50;
        }

        .dish-category {
            font-size: 14px;
            color: #8b4513;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .dish-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            text-align: justify;
            /* 保证对齐 */
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /*
        ========================================
        7. 详情浮窗 (Expanded Modal)
        ========================================
        */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        .modal {
            background: #fff;
            width: 90%;
            max-width: 900px;
            border-radius: 24px;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .overlay.active .modal {
            transform: scale(1);
        }

        .modal-left {
            width: 400px;
            background: #fdfaf5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            border-right: 1px solid #eee;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        /* 弹窗图片容器样式 - 彻底重置以确保 flex 居中生效 */
        #modalImageWrapper {
            width: 320px;
            height: 320px;
            position: relative;
            top: 0;
            left: 0;
            transform: none;
            margin: 0;
            display: flex; /* 让内部图片也能通过 flex 居中，双重保险 */
            align-items: center;
            justify-content: center;
        }

        #modalImageWrapper .dish-img-normal {
            width: 300px;
            height: 300px;
            object-fit: contain;
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #modalImageWrapper .dish-img-explode {
            width: 340px;
            height: 340px;
            object-fit: contain;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: 3;
            filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
        }

        /* 弹窗内图片悬停效果 - 修复权重问题 */
        .modal-left:hover #modalImageWrapper .dish-img-normal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
        }

        .modal-left:hover #modalImageWrapper .dish-img-explode {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.15);
        }

        .modal-right {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .modal-title {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }

        .modal-category {
            font-size: 16px;
            color: #8b4513;
            margin-bottom: 20px;
        }

        .modal-intro {
            font-size: 14px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #8b4513;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-item {
            margin-bottom: 10px;
        }

        .stat-label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
            font-weight: 600;
        }

        .stat-progress-bg {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-progress-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 1s ease-out;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #eee;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            color: #666;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: #8b4513;
            color: #fff;
        }

        /*
        ========================================
        8. 图例 (放置于底部，非悬浮遮挡)
        ========================================
        */
        .legend {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(255,255,255,0.2);
            padding: 8px 0;
            margin-top: 10px;
            border-radius: 8px;
            flex-shrink: 0; /* 保证底部图例不被压缩 */
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px; /* 稍微调大字号 */
            color: #333;
            font-weight: 700;
        }

        .legend-dot {
            width: 14px; /* 稍微调大色块 */
            height: 14px;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /*
        ========================================
        9. 响应式适配
        ========================================
        */
        @media (max-width: 1200px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .modal { flex-direction: column; }
            .modal-left { width: 100%; padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    
        /* 返回按钮 - 小箭头样式 */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            background: rgba(200, 48, 46, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background: rgba(200, 48, 46, 0.25);
            transform: scale(1.1);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: #c8302e;
            stroke-width: 2.5;
            fill: none;
        }
    </style>
</head>

                scores: [9, 7, 7, 8, 8, 9, 9, 9],
                shortDesc: "汤清味醇，鸽肉酥烂，黄山山珍滋补，徽式重火功之作。",
                longIntro: "黄山炖鸽是徽菜中的滋补珍品。选用黄山本地乳鸽与当地山药、野山菌一同炖制。鸽肉软烂，汤汁如清水般透彻却鲜味浓郁醇厚。徽菜擅长炖、焖，讲究火功，这道菜完美展示了徽商饮食中对“真材实料、原汁原味、滋补调理”的重视。每一口汤都凝聚了黄山大山的精华，是徽派养生文化的杰作。",
                img1: "images/黄山炖鸽1.png",
                img2: "images/黄山乳鸽2.png", // 注意用户提供的文件名
                details: ["180分钟", "清鲜醇香", "乳鸽/黄山山药", "150-250元", "慢火长炖", "高蛋白极低脂", "徽菜精华", "古徽商宴客珍品"]
            }
        ];

        // 2. 初始化图例
        const legendContainer = document.getElementById('legend');
        dimensions.forEach(dim => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<div class="legend-dot" style="background:${dim.color}"></div><span>${dim.name}</span>`;
            legendContainer.appendChild(item);
        });

        // 3. 绘图逻辑
        function drawRings(canvas, scores, isModal = false) {
            const ctx = canvas.getContext('2d');
            const cw = canvas.width;
            const ch = canvas.height;
            const cx = cw / 2;
            const cy = ch / 2;

            const numDimensions = 8;
            const numLevels = 10;

            // 修复：针对 500x500 的弹窗 Canvas 和 450x450 的首页 Canvas 分别设置半径
            // 确保 outerRadius 绝不超过 Canvas 半径，防止切边
            const innerRadius = isModal ? 130 : 85;
            const outerRadius = isModal ? 240 : 135;

            // 维度间的物理间距
            const dimensionGap = isModal ? 4 : 2;

            // 计算每个大维度环的总宽度
            const totalAvailableWidth = outerRadius - innerRadius - (numDimensions - 1) * dimensionGap;
            const dimensionWidth = totalAvailableWidth / numDimensions;
            const levelWidth = dimensionWidth / numLevels;
            const levelGap = 0.3; // 极细线条间隙

            ctx.clearRect(0, 0, cw, ch);

            const quadrantStarts = [-Math.PI / 2, 0, Math.PI / 2, Math.PI];

            dimensions.forEach((dim, idx) => {
                const score = scores[idx];
                const qIdx = Math.floor(idx / 2);
                const startAngle = quadrantStarts[qIdx];
                const arcLength = (score / 10) * (Math.PI * 2);
                const endAngle = startAngle + arcLength;

                // 计算当前维度的起始半径位置（包含前面的间距）
                const currentDimBaseRadius = innerRadius + (idx * (dimensionWidth + dimensionGap));

                for (let level = 0; level < numLevels; level++) {
                    const r = currentDimBaseRadius + (level * levelWidth);

                    // 背景圆环 (极淡)
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.lineWidth = levelWidth - levelGap;
                    ctx.strokeStyle = 'rgba(200, 200, 200, 0.06)';
                    ctx.stroke();

                    // 数据圆弧
                    if (score > 0) {
                        ctx.beginPath();
                        ctx.arc(cx, cy, r, startAngle, endAngle);
                        ctx.lineWidth = levelWidth - levelGap;
                        ctx.strokeStyle = dim.color;
                        ctx.stroke();
                    }
                }
            });

            // 中心遮罩
            ctx.beginPath();
            ctx.arc(cx, cy, innerRadius - 2, 0, Math.PI * 2);
            ctx.fillStyle = isModal ? '#fdfaf5' : '#f5f3ed';
            ctx.fill();
        }

        // 4. 生成页面内容
        const grid = document.getElementById('cardsGrid');
        dishesData.forEach((dish, index) => {
            const item = document.createElement('div');
            item.className = 'dish-item';
            item.style.backgroundColor = 'transparent'; // 确保完全透明

            item.innerHTML = `
                <div class="ring-container">
                    <canvas id="canvas-${index}" width="450" height="450"></canvas>
                    <div class="image-wrapper">
                        <img src="${dish.img1}" class="dish-img-normal">
                        <img src="${dish.img2}" class="dish-img-explode">
                    </div>
                </div>
                <div class="dish-info">
                    <div class="dish-name">${dish.name}</div>
                    <div class="dish-category">${dish.category}</div>
                    <div class="dish-desc">${dish.shortDesc}</div>
                </div>
            `;

            grid.appendChild(item);

            // 立即绘制
            const canvas = document.getElementById(`canvas-${index}`);
            drawRings(canvas, dish.scores);

            // 点击事件
            item.onclick = () => openModal(dish);
        });

        // 5. 模态框逻辑
        const overlay = document.getElementById('overlay');

        function openModal(dish) {
            document.getElementById('modalTitle').innerText = dish.name;
            document.getElementById('modalCategory').innerText = dish.category;
            document.getElementById('modalIntro').innerText = dish.longIntro;

            // 设置图片
            document.getElementById('modalImgNormal').src = dish.img1;
            document.getElementById('modalImgExplode').src = dish.img2;

            // 详情统计
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';
            dimensions.forEach((dim, i) => {
                const stat = document.createElement('div');
                stat.className = 'stat-item';
                stat.innerHTML = `
                    <div class="stat-label-row">
                        <span>${dim.name}：${dish.details[i]}</span>
                        <span>${dish.scores[i]}分</span>
                    </div>
                    <div class="stat-progress-bg">
                        <div class="stat-progress-fill" style="background:${dim.color}; width:0%"></div>
                    </div>
                `;
                statsGrid.appendChild(stat);

                // 动画效果
                setTimeout(() => {
                    stat.querySelector('.stat-progress-fill').style.width = (dish.scores[i] * 10) + '%';
                }, 100);
            });

            overlay.classList.add('active');
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        document.getElementById('closeBtn').onclick = closeModal;
        overlay.onclick = (e) => { if(e.target === overlay) closeModal(); };
        window.onkeydown = (e) => { if(e.key === 'Escape') closeModal(); };

    </script>
</body>
</html>
