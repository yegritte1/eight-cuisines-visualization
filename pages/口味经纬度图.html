<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中华烹饪味觉图志 - 交互视界 (雅致宣纸版)</title>
    <script src="../libs/tailwind/tailwind.js"></script>
    <script src="../libs/echarts/echarts.min.js"></script>
    <link href="../libs/fonts/fonts-local.css" rel="stylesheet">
    <style>
        :root {
            --bg-paper: #f0e8d6;  /* 用户指定色号 */
            --ink: #2d2d2d;      /* 墨色 */
            --cinnabar: #9e2a2b; /* 朱砂红 */
            --gold: #c8a063;     /* 雅金色 */
            --silk-dark: #d4a373;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            background-color: var(--bg-paper); font-family: 'Noto Serif SC', serif; color: var(--ink);
        }

        /* 宣纸纹理 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            opacity: 0.2; pointer-events: none; z-index: 50;
        }

        .full-screen-layout { height: 100vh; display: flex; flex-direction: column; }

        .divider-h { width: 100%; height: 1px; background: linear-gradient(to right, transparent, rgba(45, 45, 45, 0.08), transparent); }
        .divider-v { width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(45, 45, 45, 0.08), transparent); }

        /* 地图显示区域 */
        .map-section {
            width: 70%; height: 100%; position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .map-container {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .map-image {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
            opacity: 0.95;
        }

        /* 呼吸灯标记点 */
        .hotspot-trigger {
            position: absolute; width: 18px; height: 18px; transform: translate(-50%, -50%);
            cursor: pointer; z-index: 200;
        }
        .hotspot-dot {
            position: absolute; top: 50%; left: 50%; width: 7px; height: 7px;
            background-color: var(--cinnabar); border-radius: 50%;
            transform: translate(-50%, -50%); border: 1.5px solid #fff;
            box-shadow: 0 0 12px rgba(158, 42, 43, 0.4);
            transition: all 0.3s ease;
        }
        .hotspot-trigger:hover .hotspot-dot { transform: translate(-50%, -50%) scale(1.4); background-color: #fff; border-color: var(--cinnabar); }

        .hotspot-ring {
            position: absolute; top: 50%; left: 50%; width: 22px; height: 22px;
            border: 2px solid var(--cinnabar); border-radius: 50%;
            transform: translate(-50%, -50%); animation: pulse 3s infinite; opacity: 0;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .mini-tip {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
            background: rgba(45, 45, 45, 0.9); color: #fff; padding: 4px 12px; border-radius: 2px;
            font-size: 11px; white-space: nowrap; opacity: 0; visibility: hidden; transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-weight: 700;
        }
        .hotspot-trigger:hover .mini-tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        /* 右侧文字面板 */
        .info-panel {
            width: 30%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; padding: 60px 40px;
            position: relative; background: rgba(255,255,255,0.1);
        }

        .info-content {
            opacity: 0; transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .info-content.active { opacity: 1; transform: translateY(0); }

        .info-title { font-size: 42px; font-weight: 900; color: var(--cinnabar); margin-bottom: 15px; letter-spacing: 4px; }
        .info-subtitle { font-size: 18px; font-weight: 300; color: var(--silk-dark); margin-bottom: 30px; letter-spacing: 6px; border-bottom: 1px solid rgba(200, 160, 99, 0.3); padding-bottom: 10px; display: inline-block; }
        .info-desc { font-size: 15px; line-height: 2; color: #555; text-align: justify; white-space: pre-wrap; }

        /* 雅致标题区 */
        .page-header { position: absolute; top: 30px; left: 50px; z-index: 100; }
        .page-title { font-size: 36px; font-weight: 900; letter-spacing: 10px; color: var(--ink); text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        .page-subtitle { font-size: 13px; font-weight: 300; letter-spacing: 14px; color: #888; text-transform: uppercase; margin-top: 8px; }

        /* 图例样式 */
        .legend-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 40px 15px 40px;
            z-index: 100;
            position: relative;
        }
        .legend-item {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: #666;
            padding: 2px 0;
        }
        .legend-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .legend-item b {
            color: var(--cinnabar);
            margin-right: 4px;
        }

    
        /* 返回按钮 - 小箭头样式 */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            background: rgba(200, 48, 46, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background: rgba(200, 48, 46, 0.25);
            transform: scale(1.1);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: #c8302e;
            stroke-width: 2.5;
            fill: none;
        }
    </style>
</head>

<div class="page-header">

    <div class="full-screen-layout">

        // --- 2. 交互文字介绍逻辑 ---
        const pointDetails = {

            '锦绣巴蜀': { title: '锦绣巴蜀', subtitle: '川菜之魂 · 百变麻辣', desc: '豆瓣酱的红亮，花椒的跳跃。巴蜀之地将“辣”演变成了千变万化的艺术，在湿冷的盆地中，激发出最热烈的生命激情。' },

            '中原气象': { title: '中原气象', subtitle: '饮食正宗 · 咸鲜之根', desc: '作为中华文明的腹地，这里的饮食讲究中庸之道。咸鲜得宜，不偏不倚，是众多地方菜系演变的共同底色。' },
            '江淮余韵': { title: '江淮余韵', subtitle: '淮扬清流 · 文人雅致', desc: '刀工如绣，火工如画。江淮之间的烹饪带有浓厚的文人气息，清淡中见真章，和平中显尊贵。' },
            '黄山云雾': { title: '黄山云雾', subtitle: '徽菜密码 · 山珍重味', desc: '云雾缭绕的高山为徽菜提供了无穷的素材。重油、重色、重火功，将山间野味转化为浓郁醇厚的经典。' },
            '江南水脉': { title: '江南水脉', subtitle: '鱼米之乡 · 甜美润泽', desc: '河网密布的江南，水产是绝对的主角。这里的味道总是带着一丝若有若无的清甜，正如江南的雨，温润而绵长。' },
            '吴越风华': { title: '吴越风华', subtitle: '浙菜精髓 · 细致委婉', desc: '东坡肉的软糯，西湖醋鱼的鲜嫩。吴越之地的饮食既有书生气的雅，也有市井气的真。' },
            '淮扬清鲜': { title: '淮扬清鲜', subtitle: '淮上名厨 · 极简至味', desc: '追求食材的极致鲜美。不使用过多的调味，全凭食材本身的质地与厨师对火候的精准拿捏。' },
            '南岭光照': { title: '南岭光照', subtitle: '粤地基因 · 原汁原味', desc: '充足的光照让食材生长旺盛。粤菜以此为基础，构建了追求原汁原味的烹饪体系。' },
            '东海季风': { title: '东海季风', subtitle: '海洋慷慨 · 咸潮之鲜', desc: '太平洋的季风带来了丰富的海洋资源。从鱼虾到贝类，咸潮的气息被厨师捕捉，转化为最灵动的鲜活。' },
            '滨海高湿': { title: '滨海高湿', subtitle: '腌渍美学 · 时间艺术', desc: '在高湿的沿海环境，脱水与腌渍不仅是保存手段，更是一种独特的风味创造过程。' },
            '三湘香辣': { title: '三湘香辣', subtitle: '剁椒灵魂 · 热辣奔放', desc: '火红的剁椒是湘菜的旗帜。它不像川味的麻，而是一种直抵灵魂的香辣，热烈而纯粹。' },
            '云贵秘境': { title: '云贵秘境', subtitle: '少数智慧 · 奇巧酸辣', desc: '多民族聚居的云贵，将自然界的各种奇巧食材信手拈来。酸汤、野果、香料，构成了一幅斑斓的味觉地图。' },
            '岭南丰鲜': { title: '岭南丰鲜', subtitle: '粤式经典 · 追求本真', desc: '岭南大地物产丰盛。这里的烹饪哲学是“不时不食”，每一道菜都是对食材新鲜度的最高致敬。' },
            '南海渔火': { title: '南海渔火', subtitle: '深海馈赠 · 鲜甜之极', desc: '深入南海腹地，带回最原始的深海味道。无需繁杂修饰，简单的蒸煮即可唤醒极致的鲜甜。' },
            '八闽山海': { title: '八闽山海', subtitle: '闽菜传奇 · 煨炖醇香', desc: '坛启荤香飘四邻。佛跳墙的故事在这里流传，展现了山海素材交融后的极致鲜醇。' },
            '绝味辛香': { title: '绝味辛香', subtitle: '香料王国 · 调和艺术', desc: '不仅是辣椒，更是八角、桂皮、草果等香料的完美合鸣。在这里，调味是一场宏大的交响乐。' }
        };

        function updateInfo(key) {
            const data = pointDetails[key];
            if (!data) return;

            const container = document.getElementById('info-container');
            container.classList.remove('active');

            setTimeout(() => {
                document.getElementById('info-title').innerText = data.title;
                document.getElementById('info-subtitle').innerText = data.subtitle;
                document.getElementById('info-desc').innerText = data.desc;
                container.classList.add('active');
            }, 300);
        }

        // 初始化
        window.onload = () => updateInfo('高原物候');
    </script>
</body>
</html>
