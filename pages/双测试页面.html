<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>八大菜系双重测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '宋体', SimSun, serif;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8D5C4 100%);
            color: #3E2723;
            overflow-x: hidden;
            min-height: 100vh;
            background-image:

                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(139, 69, 19, 0.02) 2px, rgba(139, 69, 19, 0.02) 4px);
        }

        /* 主容器 */
        .main-container {
            display: flex;
            min-height: 100vh;
        }

        /* 左右分屏 */
        .quiz-section {
            flex: 1;
            padding: 60px 40px;
            position: relative;
        }

        .left-section {
            border-right: 2px solid rgba(139, 69, 19, 0.3);
        }

        /* 标题 */
        .section-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #3E2723;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .section-subtitle {
            text-align: center;
            font-size: 16px;
            color: #6D4C41;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* 问题 */
        .question {
            margin-bottom: 40px;
        }

        .question-number {
            display: inline-block;
            border: 2px solid #C62828;
            color: #C62828;
            padding: 4px 12px;
            font-size: 14px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 20px;
            color: #3E2723;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            display: flex;
            align-items: flex-start;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(139, 69, 19, 0.15);
        }

        .option:hover {
            background: rgba(198, 40, 40, 0.05);
            padding-left: 30px;
        }

        .option.selected {
            background: rgba(198, 40, 40, 0.1);
            border-left: 3px solid #C62828;
            padding-left: 27px;
        }

        .option-label {
            width: 28px;
            height: 28px;
            border: 2px solid #8D6E63;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #6D4C41;
            flex-shrink: 0;
            margin-right: 15px;
            font-size: 14px;
        }

        .option.selected .option-label {
            background: #C62828;
            border-color: #C62828;
            color: white;
        }

        .option-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.6;
            color: #3E2723;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 35px;
            border: 2px solid #8D6E63;
            background: transparent;
            color: #6D4C41;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: '宋体', SimSun, serif;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #8D6E63;
            color: white;
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8D6E63, #6D4C41);
            color: white;
            border-color: #6D4C41;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(109, 76, 65, 0.4);
        }

        /* 结果页 */
        .result-section {
            display: none;
            padding-top: 80px;
        }

        .result-title {
            text-align: center;
            font-size: 38px;
            color: #C62828;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .result-subtitle {
            text-align: center;
            font-size: 18px;
            color: #6D4C41;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .result-content {
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.9;
            font-size: 16px;
            color: #5D4037;
        }

        .result-label {
            color: #C62828;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 17px;
            letter-spacing: 2px;
        }

        /* 装饰线 */
        .divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8D6E63, transparent);
            margin: 30px auto;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }

            .left-section {
                border-right: none;
                border-bottom: 2px solid rgba(139, 69, 19, 0.3);
            }

            .quiz-section {
                padding: 40px 30px;
            }

            .section-title {
                font-size: 26px;
            }

            .question-text {
                font-size: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition-duration: 0.01ms !important;
            }
        }
    
        /* 返回按钮 - 小箭头样式 */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            background: rgba(200, 48, 46, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background: rgba(200, 48, 46, 0.25);
            transform: scale(1.1);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: #c8302e;
            stroke-width: 2.5;
            fill: none;
        }
    </style>
</head>

            document.getElementById('leftQuestionText').textContent = q.question;

            const container = document.getElementById('leftOptions');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (leftAnswers[index] === i ? ' selected' : '');
                div.innerHTML = `
                    <div class="option-label">${String.fromCharCode(65 + i)}</div>
                    <div class="option-text">${opt.text}</div>
                `;
                div.onclick = () => selectLeft(index, i);
                container.appendChild(div);
            });

            document.getElementById('leftPrevBtn').disabled = index === 0;
        }

        function selectLeft(qIndex, optIndex) {
            leftAnswers[qIndex] = optIndex;
            showLeftQuestion(qIndex);
        }

        function previousLeft() {
            if (leftCurrent > 0) {
                showLeftQuestion(leftCurrent - 1);
            }
        }

        function nextLeft() {
            if (leftAnswers[leftCurrent] === undefined) {
                alert('请先选择一个答案');
                return;
            }

            if (leftCurrent < leftQuestions.length - 1) {
                showLeftQuestion(leftCurrent + 1);
            } else {
                showLeftResult();
            }
        }

        function showLeftResult() {
            const scores = {};
            leftAnswers.forEach((ans, i) => {
                const val = leftQuestions[i].options[ans].value;
                scores[val] = (scores[val] || 0) + 1;
            });

            let maxScore = 0, key = '';
            for (let k in scores) {
                if (scores[k] > maxScore) {
                    maxScore = scores[k];
                    key = k;
                }
            }

            // 处理分组结果
            let finalKey = '';
            if (key === '川湘') {
                finalKey = '川'; // 默认川菜
            } else if (key === '粤闽') {
                finalKey = '粤'; // 默认粤菜
            } else if (key === '苏浙') {
                finalKey = '苏'; // 默认苏菜
            } else if (key === '鲁徽') {
                finalKey = '鲁'; // 默认鲁菜
            } else {
                finalKey = key.charAt(0);
            }

            // 如果结果不存在，使用川菜作为默认
            if (!leftResults[finalKey]) {
                finalKey = '川';
            }

            const result = leftResults[finalKey];

            console.log('Left result:', finalKey, result);

            document.getElementById('leftQuiz').classList.add('hidden');
            document.getElementById('leftResult').classList.remove('hidden');
            document.getElementById('leftResult').style.display = 'block';
            document.getElementById('leftResultTitle').textContent = result.title;
            document.getElementById('leftResultSubtitle').textContent = result.subtitle;
            document.getElementById('leftResultTraits').textContent = result.traits;
            document.getElementById('leftResultDishes').textContent = result.dishes;
            document.getElementById('leftResultAttitude').textContent = result.attitude;
        }

        function restartLeft() {
            leftCurrent = 0;
            leftAnswers = [];
            document.getElementById('leftResult').classList.add('hidden');
            document.getElementById('leftQuiz').classList.remove('hidden');
            showLeftQuestion(0);
        }

        // 右侧函数
        function showRightQuestion(index) {
            rightCurrent = index;
            const q = rightQuestions[index];

            document.getElementById('rightNum').textContent = index + 1;
            document.getElementById('rightQuestionText').textContent = q.question;

            const container = document.getElementById('rightOptions');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (rightAnswers[index] === i ? ' selected' : '');
                div.innerHTML = `
                    <div class="option-label">${String.fromCharCode(65 + i)}</div>
                    <div class="option-text">${opt.text}</div>
                `;
                div.onclick = () => selectRight(index, i);
                container.appendChild(div);
            });

            document.getElementById('rightPrevBtn').disabled = index === 0;
        }

        function selectRight(qIndex, optIndex) {
            rightAnswers[qIndex] = optIndex;
            showRightQuestion(qIndex);
        }

        function previousRight() {
            if (rightCurrent > 0) {
                showRightQuestion(rightCurrent - 1);
            }
        }

        function nextRight() {
            if (rightAnswers[rightCurrent] === undefined) {
                alert('请先选择一个答案');
                return;
            }

            if (rightCurrent < rightQuestions.length - 1) {
                showRightQuestion(rightCurrent + 1);
            } else {
                showRightResult();
            }
        }

        function showRightResult() {
            const scores = {};
            rightAnswers.forEach((ans, i) => {
                const val = rightQuestions[i].options[ans].value;
                scores[val] = (scores[val] || 0) + 1;
            });

            let maxScore = 0, key = '';
            for (let k in scores) {
                if (scores[k] > maxScore) {
                    maxScore = scores[k];
                    key = k;
                }
            }

            // 如果key不存在，使用川湘作为默认
            if (!rightResults[key]) {
                key = '川湘';
            }

            const result = rightResults[key];

            console.log('Right result:', key, result);

            document.getElementById('rightQuiz').classList.add('hidden');
            document.getElementById('rightResult').classList.remove('hidden');
            document.getElementById('rightResult').style.display = 'block';
            document.getElementById('rightResultTitle').textContent = result.title;
            document.getElementById('rightResultSubtitle').textContent = result.subtitle;
            document.getElementById('rightResultAnalysis').textContent = result.analysis;
            document.getElementById('rightResultDishes').textContent = result.dishes;
            document.getElementById('rightResultAdvice').textContent = result.advice;
        }

        function restartRight() {
            rightCurrent = 0;
            rightAnswers = [];
            document.getElementById('rightResult').classList.add('hidden');
            document.getElementById('rightQuiz').classList.remove('hidden');
            showRightQuestion(0);
        }
    </script>
</body>
</html>
