<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八大菜系·烹饪方法桑基图</title>
    <script src="../libs/echarts/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f0e8;  /* 宣纸米白底 */
            height: 100vh;
            overflow: hidden;
            font-family: 'SimSun', 'NSimSun', 'FangSong', 'STSong', serif;  /* 宋体 */
        }

        /* 纸张肌理纹理背景 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(40,30,20,0.03) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(40,30,20,0.02) 1px, transparent 1px);
            background-size: 80px 80px, 60px 60px;
            pointer-events: none;
            opacity: 0.6;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 40px;
            position: relative;
            z-index: 1;
        }

        /* 返回按钮 - 小箭头样式 */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            width: 36px;
            height: 36px;
            background: rgba(200, 48, 46, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-button:hover {
            background: rgba(200, 48, 46, 0.25);
            transform: scale(1.1);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: #c8302e;
            stroke-width: 2.5;
            fill: none;
        }

        /* 顶部图例区域 - 横向排列 */
        .legend-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 20px 40px;
            margin-bottom: 25px;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 15px;
            border-radius: 12px;
            position: relative;
            flex: 1;
        }

        .legend-item:hover {
            background: rgba(200,48,46,0.08);
            transform: translateY(-5px);
        }

        .legend-item.active {
            background: rgba(200,48,46,0.15);
            box-shadow: 0 6px 20px rgba(200,48,46,0.3);
        }

        .legend-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: #c8302e;
            border-radius: 2px;
        }

        .legend-icon {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 3px 12px rgba(42,26,15,0.12);
            border: 2px solid rgba(200,48,46,0.1);
            transition: all 0.3s ease;
        }

        .legend-item:hover .legend-icon {
            border-color: rgba(200,48,46,0.4);
            box-shadow: 0 6px 20px rgba(200,48,46,0.2);
        }

        .legend-item.active .legend-icon {
            border-color: #c8302e;
            border-width: 3px;
        }

        .legend-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .legend-name {
            font-size: 18px;
            font-weight: 600;
            color: #2a1a0f;
            letter-spacing: 2px;
        }

        .legend-item.active .legend-name {
            color: #c8302e;
        }

        /* 桑基图容器 */
        .chart-container {
            flex: 1;
            padding: 20px;
        }

        #sankeyChart {
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>
        <!-- 返回按钮 -->
    <a href="../catalog.html" class="back-button" title="返回目录">
        <svg viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </a>

<div class="container">
        <!-- 顶部横向图例 -->
        <div class="legend-bar" id="legendBar"></div>

        <!-- 桑基图 -->
        <div class="chart-container">
            <div id="sankeyChart"></div>
        </div>
    </div>


    <script>
        (function() {
            const cuisines = ["鲁菜", "川菜", "粤菜", "苏菜", "闽菜", "浙菜", "湘菜", "徽菜"];
            const cookingMethods = ["炒", "炸", "蒸", "煮", "炖", "焖", "煎", "烤"];

            const relationMap = {
                "鲁菜": { "煎": 8, "炖": 9, "煮": 6, "焖": 5, "炒": 5, "烤": 3 },
                "川菜": { "炒": 10, "炸": 8, "煎": 7, "煮": 6, "烤": 5, "焖": 4 },
                "粤菜": { "蒸": 10, "煮": 7, "炖": 8, "炒": 6, "煎": 5, "焖": 3 },
                "苏菜": { "炖": 9, "焖": 8, "煎": 7, "蒸": 6, "煮": 5, "炒": 4 },
                "闽菜": { "炸": 7, "蒸": 8, "炖": 7, "煮": 6, "煎": 5, "炒": 4 },
                "浙菜": { "炒": 8, "炖": 7, "焖": 7, "煎": 6, "蒸": 5, "煮": 4 },
                "湘菜": { "炒": 9, "煮": 7, "煎": 7, "炖": 6, "炸": 5, "焖": 4 },
                "徽菜": { "煎": 9, "炖": 8, "煮": 6, "焖": 7, "炒": 5, "烤": 4 }
            };

            let selectedMethod = null;

            // 渲染顶部图例
            const legendBar = document.getElementById('legendBar');
            cookingMethods.forEach(method => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.dataset.method = method;

                const icon = document.createElement('div');
                icon.className = 'legend-icon';

                const img = document.createElement('img');
                img.src = `images/${method}.png`;
                img.alt = method;

                const name = document.createElement('div');
                name.className = 'legend-name';
                name.textContent = method;

                icon.appendChild(img);
                item.appendChild(icon);
                item.appendChild(name);
                legendBar.appendChild(item);

                // 点击事件
                item.addEventListener('click', () => {
                    if (selectedMethod === method) {
                        // 取消选择
                        selectedMethod = null;
                        document.querySelectorAll('.legend-item').forEach(el => {
                            el.classList.remove('active');
                        });
                        highlightMethod(null);
                    } else {
                        // 选择新的
                        selectedMethod = method;
                        document.querySelectorAll('.legend-item').forEach(el => {
                            el.classList.remove('active');
                        });
                        item.classList.add('active');
                        highlightMethod(method);
                    }
                });
            });

            // 构建桑基图数据
            let nodes = [];
            let links = [];

            const cuisineColors = {
                "鲁菜": "#3a2a20",
                "川菜": "#c8302e",
                "粤菜": "#4a3428",
                "苏菜": "#2a1a15",
                "闽菜": "#a02520",
                "浙菜": "#5a4030",
                "湘菜": "#b8282c",
                "徽菜": "#352218"
            };

            const methodColors = {
                "炒": "#c8302e",
                "炸": "#3a2a20",
                "蒸": "#8a2420",
                "煮": "#4a3428",
                "炖": "#a02520",
                "焖": "#5a4030",
                "煎": "#d83832",
                "烤": "#2a1a15"
            };

            cuisines.forEach(cuisine => {
                nodes.push({
                    name: cuisine,
                    itemStyle: {
                        color: cuisineColors[cuisine],
                        borderColor: '#f5f0e8',
                        borderWidth: 2,
                        shadowBlur: 10,
                        shadowColor: 'rgba(42,26,15,0.3)'
                    }
                });
            });

            cookingMethods.forEach(method => {
                nodes.push({
                    name: method,
                    itemStyle: {
                        color: methodColors[method],
                        borderColor: '#f5f0e8',
                        borderWidth: 2,
                        shadowBlur: 10,
                        shadowColor: 'rgba(42,26,15,0.3)'
                    }
                });
            });

            for(let cuisine of cuisines) {
                const methodsObj = relationMap[cuisine];
                if(methodsObj) {
                    for(let [method, weight] of Object.entries(methodsObj)) {
                        if(weight && weight > 0 && cookingMethods.includes(method)) {
                            links.push({
                                source: cuisine,
                                target: method,
                                value: weight
                            });
                        }
                    }
                }
            }

            const chartDom = document.getElementById('sankeyChart');
            const myChart = echarts.init(chartDom);

            const option = {
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(250, 245, 235, 0.98)',
                    borderColor: '#c8302e',
                    borderWidth: 2,
                    textStyle: {
                        color: '#2a1a0f',
                        fontSize: 14,
                        fontFamily: 'SimSun, NSimSun, FangSong, STSong, serif'
                    },
                    formatter: function(params) {
                        if (params.dataType === 'edge') {
                            return `<div style="padding: 10px;">
                                <strong style="font-size: 15px;">${params.data.source}</strong> → <strong style="font-size: 15px;">${params.data.target}</strong>
                                <br/><span style="color: #8a6a5a;">匹配强度: </span><span style="color: #c8302e; font-weight: bold; font-size: 16px;">${params.data.value}</span>
                            </div>`;
                        } else {
                            return `<div style="padding: 10px;">
                                <strong style="font-size: 16px;">${params.name}</strong>
                                <br/><span style="color: #8a6a5a;">${cuisines.includes(params.name) ? '菜系流派' : '烹饪技法'}</span>
                            </div>`;
                        }
                    }
                },
                series: [{
                    type: 'sankey',
                    layout: 'none',
                    emphasis: {
                        focus: 'adjacency',
                        lineStyle: {
                            opacity: 0.6
                        }
                    },
                    data: nodes,
                    links: links,
                    nodeWidth: 45,
                    nodeGap: 28,
                    nodeAlign: 'left',
                    layoutIterations: 64,
                    draggable: false,
                    label: {
                        show: true,
                        position: 'right',
                        fontSize: 17,
                        fontWeight: '600',
                        color: '#2a1a0f',
                        fontFamily: 'SimSun, NSimSun, FangSong, STSong, serif',
                        formatter: '{b}'
                    },
                    lineStyle: {
                        color: 'source',
                        curveness: 0.5,
                        opacity: 0.25
                    },
                    left: '8%',
                    right: '12%',
                    top: '5%',
                    bottom: '5%'
                }],
                backgroundColor: 'transparent'
            };

            myChart.setOption(option);

            // 点击桑基图节点时，同步高亮顶部图例
            myChart.on('click', function(params) {
                if (params.dataType === 'node' && cookingMethods.includes(params.name)) {
                    const method = params.name;

                    if (selectedMethod === method) {
                        // 取消选择
                        selectedMethod = null;
                        document.querySelectorAll('.legend-item').forEach(el => {
                            el.classList.remove('active');
                        });
                        highlightMethod(null);
                    } else {
                        // 选择新的
                        selectedMethod = method;
                        document.querySelectorAll('.legend-item').forEach(el => {
                            el.classList.remove('active');
                            if (el.dataset.method === method) {
                                el.classList.add('active');
                            }
                        });
                        highlightMethod(method);
                    }
                }
            });

            // 高亮指定烹饪方法的连接
            function highlightMethod(method) {
                if (!method) {
                    // 恢复所有
                    myChart.dispatchAction({
                        type: 'downplay',
                        seriesIndex: 0
                    });
                    return;
                }

                // 先取消所有高亮
                myChart.dispatchAction({
                    type: 'downplay',
                    seriesIndex: 0
                });

                // 高亮选中的方法节点
                myChart.dispatchAction({
                    type: 'highlight',
                    seriesIndex: 0,
                    name: method
                });
            }

            window.addEventListener('resize', function() {
                myChart.resize();
            });
        })();
    </script>
</body>
</html>
