<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百味荟萃 · 八大菜系可视化</title>
    <link href="./libs/fonts/fonts-local.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper-bg: #f5f0e8;
            --ink-dark: #2d1f1a;
            --ink-medium: #5a4a42;
            --red-primary: #c8302e;
            --red-deep: #8b1a1a;
            --gold-accent: #b8860b;
        }

        body {
            font-family: 'Noto Serif SC', 'SimSun', 'FangSong', serif;
            background: var(--paper-bg);
            color: var(--ink-dark);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 纸张纹理 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(40,30,20,0.03) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(40,30,20,0.02) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(40,30,20,0.025) 1px, transparent 1px);
            background-size: 80px 80px, 60px 60px, 100px 100px;
            pointer-events: none;
            opacity: 0.6;
            z-index: 1;
        }

        /* 水墨山水背景装饰 */
        .ink-decor {
            position: fixed;
            opacity: 0.08;
            pointer-events: none;
            z-index: 2;
        }

        .ink-decor.top-left {
            top: -50px;
            left: -50px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--ink-dark) 0%, transparent 70%);
        }

        .ink-decor.bottom-right {
            bottom: -80px;
            right: -80px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--red-deep) 0%, transparent 60%);
        }

        /* 印章装饰 */
        .seal {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 3px solid var(--red-primary);
            border-radius: 8px;
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
        }

        .seal-1 { top: 8%; right: 10%; transform: rotate(12deg); }
        .seal-2 { bottom: 12%; left: 8%; transform: rotate(-8deg); }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            overflow: hidden;
        }

        /* 顶部标题区 */
        .header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        /* 主标题 */
        .title-main {
            font-size: clamp(3.5rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.3em;
            color: var(--red-primary);
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 rgba(200, 48, 46, 0.1);
            position: relative;
            display: inline-block;
        }

        /* 标题装饰线 */
        .title-main::before,
        .title-main::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 80px;
            height: 2px;
            background: var(--red-primary);
        }

        .title-main::before {
            right: calc(100% + 30px);
        }

        .title-main::after {
            left: calc(100% + 30px);
        }

        /* 副标题 */
        .subtitle {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--ink-medium);
            font-weight: 400;
            letter-spacing: 0.5em;
            margin-bottom: 30px;
        }

        /* 项目介绍 */
        .intro {
            font-size: clamp(0.95rem, 1.8vw, 1.2rem);
            color: var(--ink-medium);
            line-height: 2;
            text-align: center;
            max-width: 800px;
            margin: 0 auto 50px;
            letter-spacing: 0.1em;
        }

        /* 组员信息 */
        .team {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(20px, 4vw, 40px);
            margin-bottom: 60px;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease-out 0.3s backwards;
        }

        .team-member {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: var(--ink-dark);
            font-weight: 500;
            letter-spacing: 0.15em;
            position: relative;
            padding: 0 15px;
        }

        .team-member::after {
            content: '·';
            position: absolute;
            right: -25px;
            color: var(--red-primary);
            font-weight: bold;
        }

        .team-member:last-child::after {
            display: none;
        }

        /* 进入按钮 */
        .enter-button {
            display: inline-block;
            padding: 18px 60px;
            background: var(--red-primary);
            color: #fff;
            font-size: clamp(1.1rem, 2.2vw, 1.5rem);
            font-weight: 600;
            letter-spacing: 0.3em;
            text-decoration: none;
            border-radius: 8px;
            border: 3px solid var(--red-primary);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(200, 48, 46, 0.3);
            animation: fadeIn 1.5s ease-out 0.6s backwards;
            position: relative;
            overflow: hidden;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .enter-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .enter-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(200, 48, 46, 0.4);
            background: var(--red-deep);
            border-color: var(--red-deep);
        }

        .enter-button span {
            position: relative;
            z-index: 1;
        }

        /* 底部装饰文字 */
        .footer-text {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: var(--ink-medium);
            letter-spacing: 0.2em;
            opacity: 0.6;
            z-index: 10;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            .header {
                margin-bottom: 40px;
            }

            .title-main::before,
            .title-main::after {
                width: 40px;
            }

            .intro {
                margin-bottom: 35px;
            }

            .team {
                margin-bottom: 40px;
                gap: 15px;
            }

            .team-member::after {
                right: -15px;
            }

            .enter-button {
                padding: 15px 45px;
            }

            .footer-text {
                bottom: 25px;
                font-size: 0.75rem;
            }

            .seal {
                width: 70px;
                height: 70px;
            }
        }

        /* 减少动画（无障碍） */
        @media (prefers-reduced-motion: reduce) {
            .header,
            .team,
            .enter-button {
                animation: none;
            }

            .enter-button:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <!-- 水墨装饰 -->
    <div class="ink-decor top-left"></div>
    <div class="ink-decor bottom-right"></div>

    <!-- 印章装饰 -->
    <div class="seal seal-1"></div>
    <div class="seal seal-2"></div>

    <div class="container">
        <!-- 标题区 -->
        <header class="header">
            <h1 class="title-main">百味荟萃</h1>
            <p class="subtitle">八大菜系数据可视化</p>
        </header>

        <!-- 项目介绍 -->
        <p class="intro">
            华夏饮食文化源远流长，八大菜系各具特色。<br>
            本项目以数据可视化的形式，呈现中国八大菜系的烹饪方法、历史演变、<br>
            地域分布、口味特征等多维度信息，探寻中华美食的传承与创新。
        </p>

        <!-- 组员信息 -->
        <div class="team">
            <span class="team-member">舒舸</span>
            <span class="team-member">宋初阳</span>
            <span class="team-member">刘嘉怡</span>
            <span class="team-member">赵宇轩</span>
        </div>

        <!-- 进入按钮 -->
        <a href="intro.html" class="enter-button">
            <span>进入展示</span>
        </a>
    </div>

    <!-- 底部装饰文字 -->
    <div class="footer-text">DATA VISUALIZATION · 2024</div>
</body>
</html>
